<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>JUST_SO EXPLORER</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&display=swap');
:root{ --bg:#f5f3ef; --paper:#fff; --bord:#ccc8c0; --ink:#1a1714; --mut:#888078; }
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:auto;overflow:auto;}
body{font-family:'DM Mono',monospace;background:var(--bg);color:var(--ink);display:flex;flex-direction:column;}

/* Chrome */
#chrome{flex-shrink:0;}
header{display:flex;align-items:center;gap:14px;padding:7px 18px;background:var(--paper);border-bottom:1px solid var(--bord);}
.logo{font-size:12px;letter-spacing:.18em;text-transform:uppercase;color:var(--ink);}
.htitle{font-size:12px;}
.files{margin-left:auto;display:flex;gap:7px;}
.fbtn{font-size:12px;padding:4px 10px;border:1px solid var(--bord);background:var(--bg);color:var(--mut);border-radius:2px;cursor:pointer;}
.fbtn:hover{border-color:var(--mut);color:var(--ink);}
.fbtn label{cursor:pointer;}
input[type=file]{display:none;}
.abtn{font-size:12px;padding:4px 10px;border:1px solid var(--bord);background:var(--bord);color:var(--ink);border-radius:2px;cursor:pointer;font-family:'DM Mono',monospace;}
.abtn:hover{background:#b8b4ac;border-color:#a8a49c;}

#legBar{display:none;align-items:center;padding:4px 18px;gap:0;background:var(--paper);border-bottom:1px solid var(--bord);}
.ll{color:var(--mut);font-size:12px;text-transform:uppercase;letter-spacing:.06em;margin-right:5px;}
.lg{display:flex;align-items:center;gap:2px;margin-right:18px;}
.step-lbl{font-size:12px;padding:1px 3px;user-select:none;}
.step-arr{display:inline-flex;align-items:center;cursor:pointer;padding:2px 3px;border-radius:3px;border:1.5px solid transparent;user-select:none;}
.step-arr:hover,.step-arr.on{border-color:currentColor;}
.site-chip{padding:2px 7px;border-radius:2px;font-size:12px;cursor:pointer;border:1px solid transparent;color:var(--mut);user-select:none;}
.site-chip:hover,.site-chip.on{border-color:var(--mut);background:#e8e4de;}
.all-chip{font-weight:500;color:var(--ink);background:var(--bord);}
.all-chip:hover,.all-chip.on{background:#b8b4ac;}
.tpick{font-family:'DM Mono',monospace;font-size:12px;color:var(--ink);background:var(--bg);border:1px solid var(--bord);border-radius:2px;padding:2px 4px;cursor:pointer;}
.tpick:focus{outline:none;border-color:var(--mut);}
#statBar{font-size:12px;color:var(--mut);padding:2px 18px;background:var(--bg);border-bottom:1px solid var(--bord);}

/* Table — height set by JS to make C bins square */
#wrap{overflow:hidden;flex-shrink:0;}
table{width:100%;height:100%;border-collapse:collapse;table-layout:fixed;}
col.ca{width:26%;}
col.cb{width:30%;}
col.cc{width:44%;}
td{vertical-align:top;padding:0;border-right:1px solid var(--bord);overflow:hidden;background:var(--paper);}
td:last-child{border-right:none;}
.phd{font-size:12px;letter-spacing:.06em;text-transform:uppercase;color:var(--ink);font-weight:400;padding:4px 12px 3px;border-bottom:1px solid var(--bord);height:24px;overflow:hidden;font-family:'DM Mono',monospace;display:flex;align-items:center;}
.phd-stat{margin-left:auto;font-weight:400;color:var(--mut);letter-spacing:.02em;font-size:12px;text-transform:none;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
/* SVG box: fill remainder of cell below header */
.sb{display:block;width:100%;height:calc(100% - 24px);overflow:hidden;position:relative;background:var(--paper);}
.sb svg{display:block;position:absolute;top:0;left:0;width:100%;height:100%;}
.empty-lbl{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:var(--bord);font-size:12px;pointer-events:none;}

/* SVG shared — NO dashes on tick marks */
.ax text{font-family:'DM Mono',monospace;font-size:12px;fill:var(--mut);}
.ax path,.ax line{stroke:var(--bord);stroke-width:1;stroke-dasharray:none;}
.axlbl{font-family:'DM Mono',monospace;font-size:12px;fill:var(--mut);}
.gl{stroke:#e8e4e0;stroke-width:.5;}
.refl{stroke:#b0ada6;stroke-width:1;stroke-dasharray:5,4;}
.adlbl{font-family:'DM Mono',monospace;font-size:12px;fill:var(--mut);}
.dbox{fill:none;stroke:#aaa8a0;stroke-width:1;stroke-dasharray:5,4;}

#tip{position:fixed;pointer-events:none;z-index:999;background:var(--paper);border:1px solid var(--bord);border-radius:3px;padding:6px 11px;font-family:'DM Mono',monospace;font-size:12px;line-height:1.7;box-shadow:0 3px 14px rgba(0,0,0,.09);opacity:0;transition:opacity .08s;}

/* Panel D — full-width alignment row below the three panels */
#wrapD{flex-shrink:0;background:var(--paper);border-top:1px solid var(--bord);}
#phdD{font-size:12px;letter-spacing:.06em;text-transform:uppercase;color:var(--ink);font-weight:400;padding:4px 12px 3px;border-bottom:1px solid var(--bord);height:24px;font-family:'DM Mono',monospace;}
#alignOuter{overflow-x:auto;overflow-y:hidden;cursor:grab;user-select:none;background:var(--paper);}
#alignOuter:active{cursor:grabbing;}
#alignInner{display:inline-block;white-space:nowrap;padding:12px 16px 10px;font-family:'DM Mono',monospace;}
.apos-row{display:flex;margin-bottom:4px;margin-left:0;}
.apos-char{
  display:inline-flex;align-items:flex-end;justify-content:center;
  width:14px;font-size:12px;color:var(--mut);font-family:'DM Mono',monospace;
  writing-mode:vertical-rl;text-orientation:mixed;height:36px;
}
.arow{display:flex;align-items:center;height:22px;margin-bottom:3px;}
.arow-lbl{
  font-size:12px;font-family:'DM Mono',monospace;font-weight:400;
  color:white;padding:0 8px;height:22px;line-height:22px;
  border-radius:3px;margin-right:8px;white-space:nowrap;flex-shrink:0;
}
.arow-seq{display:flex;}
.achar{
  display:inline-flex;align-items:center;justify-content:center;
  width:14px;height:22px;font-size:12px;line-height:1;
  border-radius:2px;cursor:default;
}
.achar.diff{cursor:pointer;font-weight:400;}
.achar.diff:hover{outline:2px solid var(--ink);outline-offset:-1px;}
#drop{display:none;position:fixed;inset:0;z-index:900;background:rgba(245,243,239,.92);border:2px dashed var(--bord);margin:16px;border-radius:4px;align-items:center;justify-content:center;font-size:12px;color:var(--mut);}
#drop.on{display:flex;}
</style>
</head>
<body>
<div id="drop">Drop files here</div>
<div id="tip"></div>
<div id="chrome">
  <header>
    <span class="logo">JUST_SO EXPLORER</span>
    <div class="files">
      <div class="fbtn" style="background:#1a1714;border-color:#1a1714;"><label style="color:white;cursor:pointer;">Load Database<input type="file" id="fDB" accept=".txt"></label></div>
      <button class="abtn" id="btnLoadEx">Load Example</button>
      <button class="abtn" id="btnDlEx">Download Example</button>
    </div>
  </header>
  <div id="statBar">Load or drag and drop database to begin.</div>
  <div id="legBar">
    <span class="ll">Step</span><div class="lg" id="sLeg"></div>
    <span class="ll" style="margin-left:8px">Site</span><div class="lg" id="siLeg"></div>
    <span class="ll" style="margin-left:auto">X</span>
    <select id="pickX" class="tpick"></select>
    <span class="ll" style="margin-left:8px">Y</span>
    <select id="pickY" class="tpick"></select>
  </div>
</div>
<div id="wrap">
  <table><colgroup><col class="ca"><col class="cb"><col class="cc"></colgroup>
  <tbody><tr>
    <td id="tdA"><div class="phd">Traits</div><div class="sb" id="bA"><div class="empty-lbl" id="emA">◈ load data</div><svg id="svgA" style="display:none"></svg></div></td>
    <td id="tdB"><div class="phd">Intermediates</div><div class="sb" id="bB"><div class="empty-lbl" id="emB">◈ load data</div><svg id="svgB" style="display:none"></svg></div></td>
    <td id="tdC"><div class="phd">Neighborhoods<span class="phd-stat" id="statC"></span></div><div class="sb" id="bC"><div class="empty-lbl" id="emC">◈ load data</div><svg id="svgC" style="display:none"></svg></div></td>
  </tr></tbody></table>
</div>
<div id="wrapD">
  <div id="phdD">Alignment</div>
  <div id="alignOuter">
    <div id="alignInner"></div>
  </div>
</div>
<script>
'use strict';

// Step colour palette — endpoints fixed, intermediates interpolated for any nMut
const SC_PALETTE=['#2b4596','#4575b4','#3a9a78','#91cf60','#fee08b','#fc8d59','#7a1818'];
// SC[i] returns colour for step i out of nMut, always anchored at navy (0) and crimson (nMut)
const SC=new Proxy(SC_PALETTE,{
  get(target,i){
    if(typeof i!=='string'||isNaN(i)) return target[i];
    const step=+i;
    if(nMut<=0||!isFinite(step)||step<0) return target[0];
    const t=Math.max(0,Math.min(1,step/nMut)); // clamp to [0,1]
    const n=target.length-1;
    const fi=t*n, lo=Math.min(Math.floor(fi),n), hi=Math.min(lo+1,n), f=fi-lo;
    const c0=target[lo]||target[0], c1=target[hi]||target[n];
    const r=v=>parseInt(v.slice(1,3),16);
    const g=v=>parseInt(v.slice(3,5),16);
    const b=v=>parseInt(v.slice(5,7),16);
    const lerp=(a,b,t)=>Math.round(a+(b-a)*t);
    const rr=lerp(r(c0),r(c1),f), gg=lerp(g(c0),g(c1),f), bb=lerp(b(c0),b(c1),f);
    return '#'+[rr,gg,bb].map(v=>v.toString(16).padStart(2,'0')).join('');
  }
});

// State
let IM=null,NB=null,sites=[],adj=null,nMut=0;
let seqA=null,seqD=null;  // ancestral and derived sequences
let selMode=null,selArrow=null,selSite=null,selDot=null;
// lastSel: holds the previous selection while hovering, restored on mouseleave
let lastMode=null,lastArrow=null,lastSite=null,lastDot=null;
let domX_AB,domY_AB,domX_C,domY_C;

// padDom: compute domain from values with 5% padding each side, snapped to integers.
// The integer snap ensures the domain is always >= 5% wider than the data,
// and all axis ticks are whole numbers.
function padDom(vals){
  const lo=d3.min(vals), hi=d3.max(vals);
  const span=hi-lo||1;  // guard against zero span
  return [Math.floor(lo - span*0.05), Math.ceil(hi + span*0.05)];
}

// wholeTicks: integer ticks, preferring multiples of 5.
// Steps skip 2 so after step=1 we jump to 5, keeping ticks at clean intervals.
function wholeTicks(domain, targetCount){
  const [lo,hi]=domain, span=hi-lo;
  const steps=[1,5,10,20,50,100,200,500];
  let best=1;
  for(const s of steps){
    const n=Math.floor(span/s)+1;
    if(n<=targetCount+2){best=s;break;}
  }
  const ticks=[];
  const start=Math.ceil(lo/best)*best;
  for(let v=start;v<=hi+1e-9;v+=best) ticks.push(Math.round(v));
  return ticks;
}

// Trait column names from file header are used directly as display labels
function traitLabel(key){ return key; }

// Available traits and active selection
let traitCols=[];  // ordered list of trait column names from file header
let traitX='';     // X axis trait — set from file header on load
let traitY='';     // Y axis trait — set from file header on load

// Parsers — dynamic: read all trait columns from header
function inferSites(im){return im.filter(d=>d.changesNum===1).map(d=>d.changes[0]?.pos).filter(Boolean).sort((a,b)=>a-b);}

// traitScale: returns 100 if all IM values for this trait are in [0,1], else 1
function traitScale(k){
  if(!IM||!IM.length) return 1;
  const vals=IM.map(d=>d.traits[k]??0);
  const lo=Math.min(...vals), hi=Math.max(...vals);
  return (lo>=0&&hi<=1)?100:1;
}

function tx(d){ return (d.traits[traitX]??0)*traitScale(traitX); }
function ty(d){ return (d.traits[traitY]??0)*traitScale(traitY); }

function computeDoms(){
  if(!IM)return;
  nMut=d3.max(IM,d=>d.changesNum)||6;
  domX_AB=padDom(IM.map(tx));
  domY_AB=padDom(IM.map(ty));
  if(NB){
    const sX=traitScale(traitX), sY=traitScale(traitY);
    const allX=[],allY=[];
    NB.forEach(posMaps=>{
      posMaps.forEach(varMap=>{
        varMap.forEach(traits=>{
          allX.push((traits[traitX]??0)*sX);
          allY.push((traits[traitY]??0)*sY);
        });
      });
    });
    domX_C=padDom(allX);
    domY_C=padDom(allY);
  }
}

// File loading
function rf(f,cb){const r=new FileReader();r.onload=e=>cb(e.target.result);r.readAsText(f);}

// Parse combined DB file: FASTA sequences at top, then tab-delimited NB data
function parseDB(txt){
  const allLines=txt.split('\n');
  let i=0;
  // Read FASTA sequences
  let sA='',sD='',label='';
  while(i<allLines.length){
    const l=allLines[i].trim();
    if(!l){i++;continue;}
    if(l.includes('\t')&&!l.startsWith('>')) break; // hit the tab-delimited header
    if(l.startsWith('>')){label=l.slice(1).trim().toLowerCase();}
    else{if(label.startsWith('a'))sA+=l;else if(label.startsWith('d'))sD+=l;}
    i++;
  }
  seqA=sA||null; seqD=sD||null;

  // Focal sites from sequences
  const focal=[],ancAAs={},derAAs={};
  if(seqA&&seqD){
    for(let j=0;j<Math.min(seqA.length,seqD.length);j++){
      if(seqA[j]!==seqD[j]){focal.push(j+1);ancAAs[j+1]=seqA[j];derAAs[j+1]=seqD[j];}
    }
  }

  // Parse NB header
  const hdr=allLines[i].split('\t');
  const nbCols=hdr.slice(4).map(h=>h.trim());
  traitCols=nbCols;
  traitX=traitCols[0]||'';
  traitY=traitCols[1]||traitCols[0]||'';
  i++;

  // Parse NB rows into map: idx -> pos -> variant -> traits
  const nb=new Map();
  while(i<allLines.length){
    const p=allLines[i++].split('\t');
    if(p.length<5) continue;
    const idx=+p[1],pos=+p[2],vari=p[3];
    const traits={};
    nbCols.forEach((k,j)=>{traits[k]=+p[4+j];});
    if(!nb.has(idx)) nb.set(idx,new Map());
    if(!nb.get(idx).has(pos)) nb.get(idx).set(pos,new Map());
    nb.get(idx).get(pos).set(vari,traits);
  }

  // Reconstruct intermediates from NB + sequences
  const imArr=[];
  nb.forEach((posMaps,idx)=>{
    if(!focal.length){imArr.push({index:idx,changesNum:0,changes:[],traits:{}});return;}
    // Count how often each trait vector appears across focal site self-mutations
    const counts=new Map(),traitMap=new Map();
    focal.forEach(site=>{
      [ancAAs[site],derAAs[site]].forEach(aa=>{
        if(posMaps.has(site)&&posMaps.get(site).has(aa)){
          const t=posMaps.get(site).get(aa);
          const key=Object.values(t).map(v=>v.toFixed(4)).join(',');
          counts.set(key,(counts.get(key)||0)+1);
          traitMap.set(key,t);
        }
      });
    });
    // Most frequent = intermediate's own traits
    let bestKey='',bestCount=0;
    counts.forEach((v,k)=>{if(v>bestCount){bestCount=v;bestKey=k;}});
    const ownTraits=traitMap.get(bestKey)||{};
    // Sites where derived AA matches own traits = mutations in this intermediate
    const changes=[];
    focal.forEach(site=>{
      const derAA=derAAs[site];
      if(posMaps.has(site)&&posMaps.get(site).has(derAA)){
        const t=posMaps.get(site).get(derAA);
        const key=Object.values(t).map(v=>v.toFixed(4)).join(',');
        if(key===bestKey) changes.push({pos:site,aa:derAA});
      }
    });
    imArr.push({index:idx,changesNum:changes.length,changes,traits:ownTraits});
  });
  imArr.sort((a,b)=>a.index-b.index);
  return{im:imArr,nb};
}

function loadDBText(t){
  const{im,nb:nbMap}=parseDB(t);
  IM=im; NB=nbMap; sites=inferSites(IM); adj=null;
  computeDoms();
  let msg='Loaded '+IM.length+' intermediates · '+NB.size+' with neighborhoods';
  if(NB.size<IM.length){
    const missing=IM.filter(d=>!NB.has(d.index)).map(d=>d.index);
    msg+=' · Missing: '+missing.join(', ');
  }
  setst(msg); go(); renderD();
}

document.getElementById('fDB').onchange=e=>{
  const f=e.target.files[0];if(!f)return;
  rf(f,loadDBText);
};

async function b64GzToText(b64){
  // Decode base64 → gzip bytes → decompress → UTF-8 string
  const bytes=Uint8Array.from(atob(b64),c=>c.charCodeAt(0));
  const ds=new DecompressionStream('gzip');
  const writer=ds.writable.getWriter();
  writer.write(bytes); writer.close();
  const out=await new Response(ds.readable).arrayBuffer();
  return new TextDecoder('utf-8').decode(out);
}

// Adjacency
function getAdj(){
  if(adj)return adj;adj=[];
  for(let i=0;i<IM.length;i++)for(let j=i+1;j<IM.length;j++){
    const a=IM[i],b=IM[j];
    if(Math.abs(a.changesNum-b.changesNum)!==1)continue;
    const lo=a.changesNum<b.changesNum?a:b,hi=a.changesNum<b.changesNum?b:a;
    const hiS=new Set(hi.changes.map(c=>c.pos));
    if(!lo.changes.every(c=>hiS.has(c.pos)))continue;
    const loS=new Set(lo.changes.map(c=>c.pos));
    const added=hi.changes.find(c=>!loS.has(c.pos));
    adj.push({from:lo,to:hi,step:hi.changesNum,site:added?added.pos:null});
  }
  return adj;
}

// Selection
function saveSel(){lastMode=selMode;lastArrow=selArrow;lastSite=selSite;lastDot=selDot;}
function restoreSel(){selMode=lastMode;selArrow=lastArrow;selSite=lastSite;selDot=lastDot;}
function clearSel(){selMode=null;selArrow=null;selSite=null;selDot=null;}
function edgeOn(e){
  if(!selMode||selMode==='all')return true;
  if(selMode==='arrow')return e.step===selArrow;
  if(selMode==='step')return false;  // derived stripe: show neighbourhood only, no edges
  if(selMode==='site')return e.site===selSite;
  if(selMode==='dot')return e.from.index===selDot||e.to.index===selDot;
  return true;
}
function nodeSet(){
  if(!selMode||selMode==='all')return null;
  const s=new Set();
  if(selMode==='arrow'){
    // Both ends of edges at this step — for dot highlighting in A/B
    IM.filter(d=>d.changesNum===selArrow-1||d.changesNum===selArrow).forEach(d=>s.add(d.index));
  }
  if(selMode==='step'){
    // Derived stripe — derived plus its direct predecessors
    IM.filter(d=>d.changesNum===selArrow||d.changesNum===selArrow-1).forEach(d=>s.add(d.index));
  }
  if(selMode==='site')getAdj().filter(e=>e.site===selSite).forEach(e=>{s.add(e.from.index);s.add(e.to.index);});
  if(selMode==='dot'){
    s.add(selDot);
    getAdj().filter(e=>e.from.index===selDot||e.to.index===selDot).forEach(e=>{s.add(e.from.index);s.add(e.to.index);});
  }
  return s;
}

// nbSet: which intermediates contribute neighbourhoods to panel C.
// Arrow/step: FROM side only (step i, not i+1).
// All other modes: same as nodeSet.
function nbSet(){
  if(!selMode||selMode==='all')return null;
  const s=new Set();
  if(selMode==='arrow'){
    // Only FROM side (preceding step)
    IM.filter(d=>d.changesNum===selArrow-1).forEach(d=>s.add(d.index));
  } else if(selMode==='step'){
    // Only the derived itself
    IM.filter(d=>d.changesNum===selArrow).forEach(d=>s.add(d.index));
  } else {
    // site and dot: same as nodeSet
    if(selMode==='site')getAdj().filter(e=>e.site===selSite).forEach(e=>{s.add(e.from.index);s.add(e.to.index);});
    if(selMode==='dot'){
      s.add(selDot);
      getAdj().filter(e=>e.from.index===selDot||e.to.index===selDot).forEach(e=>{s.add(e.from.index);s.add(e.to.index);});
    }
  }
  return s;
}
function flattenNB(posMaps){
  const rows=[];
  posMaps.forEach(varMap=>varMap.forEach(traits=>rows.push({traits})));
  return rows;
}
function nbRows(){
  if(!NB)return[];
  const ns=nbSet();
  if(!ns){let o=[];NB.forEach(pm=>{o=o.concat(flattenNB(pm));});return o;}
  let o=[];ns.forEach(i=>{if(NB.has(i))o=o.concat(flattenNB(NB.get(i)));});return o;
}

// Legend
function buildLeg(){
  const sLeg=document.getElementById('sLeg');sLeg.innerHTML='';
  // Build labels: A, 1, 2, ..., nMut-1, D
  const labels=['A',...Array.from({length:nMut-1},(_,i)=>String(i+1)),'D'];
  labels.forEach((lbl,i)=>{
    const sp=document.createElement('span');sp.className='step-lbl';sp.textContent=lbl;sp.style.color=SC[i];sLeg.appendChild(sp);
    if(i<nMut){
      const col=SC[i+1];const ar=document.createElement('span');ar.className='step-arr';ar.style.color=col;
      ar.innerHTML=`<svg width="10" height="10" viewBox="0 0 10 10"><polygon points="1,1 9,5 1,9" fill="${col}"/></svg>`;
      ar.onmouseenter=()=>{selMode='arrow';selArrow=i+1;renderAll();};
      sLeg.appendChild(ar);
    }
  });
  // Save on enter, restore on leave at container level
  sLeg.onmouseenter=()=>saveSel();
  sLeg.onmouseleave=()=>{restoreSel();renderAll();};

  const siLeg=document.getElementById('siLeg');siLeg.innerHTML='';
  const ac=document.createElement('span');ac.className='site-chip all-chip';ac.textContent='All';
  ac.onmouseenter=()=>{selMode='all';renderAll();};
  siLeg.appendChild(ac);
  sites.forEach(s=>{
    const ch=document.createElement('span');ch.className='site-chip';ch.textContent=s;
    ch.onmouseenter=()=>{selMode='site';selSite=s;showSiteTip(s);renderAll();};
    ch.onmouseleave=()=>{hideTip();};
    siLeg.appendChild(ch);
  });
  siLeg.onmouseenter=()=>saveSel();
  siLeg.onmouseleave=()=>{restoreSel();renderAll();};

  // Panel C hover → show all, restore on leave
  document.getElementById('tdC').onmouseenter=()=>{if(selMode!=='dot'){saveSel();selMode='all';renderAll();}};
  document.getElementById('tdC').onmouseleave=()=>{if(selMode!=='dot'){restoreSel();renderAll();}};
}

function sz(id){const r=document.getElementById(id).getBoundingClientRect();return{W:Math.floor(r.width),H:Math.floor(r.height)};}

// Panel C layout constants (must match renderC exactly)
const C_mL=58, C_hH=60, C_topAxisH=20, C_mT=12, C_mB=42;
const C_hW=60, C_rightAxisW=50, C_mR=10, C_PHD=24;
const C_offY = C_topAxisH + C_hH + C_mT;
const C_offR = C_mR + C_hW + C_rightAxisW;

// Compute table height so panel C bins are square.
// plotW = Wc - C_mL - C_offR
// plotH = H_svg - C_offY - C_mB
// Square: plotW = plotH => H_svg = plotW + C_offY + C_mB
// tableH = H_svg + C_PHD (header height)
function setTableHeight(){
  const{W:Wc}=sz('bC');
  if(Wc<60)return;
  const plotW=Wc-C_mL-C_offR;
  if(plotW<40)return;
  const H_svg=plotW+C_offY+C_mB;
  const tableH=H_svg+C_PHD;
  document.getElementById('wrap').style.height=tableH+'px';
}

// ── PANEL A ──────────────────────────────────────────────────
function renderA(){
  if(!IM)return;
  document.getElementById('emA').style.display='none';
  const el=document.getElementById('svgA');el.style.display='block';
  const{W,H}=sz('bA');if(W<20||H<20)return;
  const sv=d3.select(el);sv.selectAll('*').remove();sv.attr('width',W).attr('height',H);

  const mL=58,mR=38,mT=8,mB=42;
  const gap=Math.max(16,Math.round(H*.05));
  const pH=Math.floor((H-mT-mB-gap)/2);
  const iW=W-mL-mR;
  if(pH<20||iW<10)return;

  const anc=IM.find(d=>d.changesNum===0),der=IM.find(d=>d.changesNum===nMut);
  const ns=nodeSet();
  const xSc=d3.scaleLinear().domain([-1,nMut+1]).range([0,iW]);
  const xTix=wholeTicks([-1,nMut+1],nMut+2).filter(v=>v>=0&&v<=nMut);
  const xScA=d3.scaleLinear().domain(domX_AB).range([pH,0]);  // traitX scale for panel A
  const yScA=d3.scaleLinear().domain(domY_AB).range([pH,0]);  // traitY scale for panel A

  // sub(oy, ySc, acc, yLbl, isBot) — acc is the trait value accessor (tx or ty)
  function sub(oy,ySc,acc,yLbl,isBot){
    const g=sv.append('g').attr('transform',`translate(${mL},${oy})`);

    // Hover stripes
    for(let i=0;i<nMut;i++){
      const x0=xSc(i), x1=xSc(i+1);
      const col=SC[i+1];
      const stripe=g.append('rect')
        .attr('x',x0).attr('y',0)
        .attr('width',x1-x0).attr('height',pH)
        .attr('fill','transparent')
        .style('cursor','pointer');
      stripe
        .on('mouseenter',function(){
          selMode='arrow'; selArrow=i+1; renderAll();
          d3.select(this).attr('fill',col+'18');
        })
        .on('mouseleave',function(){
          d3.select(this).attr('fill','transparent');
          restoreSel(); renderAll();
        });
    }
    // Final stripe: derived neighbourhood
    {
      const x0=xSc(nMut), x1=xSc(nMut+1);
      const col=SC[nMut];
      const stripe=g.append('rect')
        .attr('x',x0).attr('y',0)
        .attr('width',x1-x0).attr('height',pH)
        .attr('fill','transparent')
        .style('cursor','pointer');
      stripe
        .on('mouseenter',function(){
          selMode='step'; selArrow=nMut; renderAll();
          d3.select(this).attr('fill',col+'18');
        })
        .on('mouseleave',function(){
          d3.select(this).attr('fill','transparent');
          restoreSel(); renderAll();
        });
    }

    g.append('g').attr('class','ax').attr('transform',`translate(0,${pH})`)
      .call(d3.axisBottom(xSc).tickValues(xTix).tickSize(4).tickFormat(d3.format('d')));
    g.append('g').attr('class','ax')
      .call(d3.axisLeft(ySc).tickValues(wholeTicks(ySc.domain(),5)).tickSize(4).tickFormat(d3.format('d')));

    // A/D reference lines and labelled dots
    [anc,der].forEach(d=>{
      if(!d) return;
      const yv=acc(d);
      const col=d.changesNum===0?SC[0]:SC[nMut];
      const lbl=d.changesNum===0?'A':'D';
      g.append('line').attr('class','refl')
        .attr('x1',0).attr('x2',iW).attr('y1',ySc(yv)).attr('y2',ySc(yv));
      g.append('circle')
        .attr('cx',iW+14).attr('cy',ySc(yv))
        .attr('r',10).attr('fill',col)
        .style('cursor','pointer')
        .on('mouseenter',function(){ selMode='dot'; selDot=d.index; renderAll(); })
        .on('mouseleave',function(){ restoreSel(); renderAll(); });
      g.append('text')
        .attr('x',iW+14).attr('y',ySc(yv)+4)
        .attr('text-anchor','middle')
        .attr('font-family','DM Mono,monospace').attr('font-size',12)
        .attr('font-weight','400').attr('fill','white')
        .attr('pointer-events','none')
        .text(lbl);
    });

    g.append('text').attr('class','axlbl').attr('transform','rotate(-90)').attr('x',-pH/2).attr('y',-44).attr('text-anchor','middle').text(yLbl);

    getAdj().forEach(e=>{
      const on=edgeOn(e);
      g.append('line').attr('x1',xSc(e.from.changesNum)).attr('y1',ySc(acc(e.from))).attr('x2',xSc(e.to.changesNum)).attr('y2',ySc(acc(e.to)))
        .attr('stroke',SC[e.step]).attr('stroke-width',on?1.6:.5).attr('stroke-opacity',on?.85:.07);
    });

    g.selectAll('circle.dotA').data(IM).join('circle')
      .attr('class','dotA')
      .attr('cx',d=>xSc(d.changesNum))
      .attr('cy',d=>ySc(acc(d)))
      .attr('r',d=>selDot===d.index?7:5).attr('fill',d=>SC[d.changesNum])
      .attr('fill-opacity',d=>!ns||ns.has(d.index)?0.9:0.1)
      .attr('stroke',d=>(selDot===d.index&&d.changesNum>0&&d.changesNum<nMut)?'var(--ink)':'none').attr('stroke-width',1.5)
      .style('cursor','pointer')
      .on('click',(e,d)=>{if(selDot===d.index)clearSel();else{clearSel();selMode='dot';selDot=d.index;}renderAll();});

    if(isBot)g.append('text').attr('class','axlbl').attr('x',iW/2).attr('y',pH+36).attr('text-anchor','middle').text('# of Mutations');
  }
  sub(mT,yScA,ty,traitLabel(traitY),false);
  sub(mT+pH+gap,xScA,tx,traitLabel(traitX),true);

  // Save on enter so leave can restore; clear arrow state on leave
  sv.on('mouseenter',()=>saveSel())
    .on('mouseleave',()=>{ restoreSel(); renderAll(); });
}

// ── PANEL B ──────────────────────────────────────────────────
function renderB(){
  if(!IM)return;
  document.getElementById('emB').style.display='none';
  const el=document.getElementById('svgB');el.style.display='block';
  const{W,H}=sz('bB');if(W<20||H<20)return;
  const sv=d3.select(el);sv.selectAll('*').remove();sv.attr('width',W).attr('height',H);

  const mL=58,mR=22,mT=18,mB=44;
  const iW=W-mL-mR,iH=H-mT-mB;
  if(iW<20||iH<20)return;

  const anc=IM.find(d=>d.changesNum===0),der=IM.find(d=>d.changesNum===nMut);
  const ns=nodeSet();
  const xSc=d3.scaleLinear().domain(domX_AB).range([0,iW]);
  const ySc=d3.scaleLinear().domain(domY_AB).range([iH,0]);
  // Save state on panel enter
  const g=sv.append('g').attr('transform',`translate(${mL},${mT})`);
  sv.on('mouseenter',()=>saveSel());

  // NO grid lines in panel B
  g.append('g').attr('class','ax').attr('transform',`translate(0,${iH})`)
    .call(d3.axisBottom(xSc).tickValues(wholeTicks(domX_AB,5)).tickSize(4).tickFormat(d3.format('d')));
  g.append('g').attr('class','ax')
    .call(d3.axisLeft(ySc).tickValues(wholeTicks(domY_AB,5)).tickSize(4).tickFormat(d3.format('d')));
  g.append('text').attr('class','axlbl').attr('x',iW/2).attr('y',iH+36).attr('text-anchor','middle').text(traitLabel(traitX));
  g.append('text').attr('class','axlbl').attr('transform','rotate(-90)').attr('x',-iH/2).attr('y',-44).attr('text-anchor','middle').text(traitLabel(traitY));

  if(anc&&der){
    g.append('rect').attr('class','dbox')
      .attr('x',Math.min(xSc(tx(anc)),xSc(tx(der)))).attr('y',Math.min(ySc(ty(anc)),ySc(ty(der))))
      .attr('width',Math.abs(xSc(tx(anc))-xSc(tx(der)))).attr('height',Math.abs(ySc(ty(anc))-ySc(ty(der))));
  }

  getAdj().forEach(e=>{
    const on=edgeOn(e);
    g.append('line').attr('x1',xSc(tx(e.from))).attr('y1',ySc(ty(e.from))).attr('x2',xSc(tx(e.to))).attr('y2',ySc(ty(e.to)))
      .attr('stroke',SC[e.step]).attr('stroke-width',on?1.7:.5).attr('stroke-opacity',on?.80:.07);
  });

  // All dots — same hover behaviour. A and D also get small dots; large labelled circles drawn on top.
  g.selectAll('circle.dotB').data(IM).join('circle')
    .attr('class','dotB')
    .attr('cx',d=>xSc(tx(d))).attr('cy',d=>ySc(ty(d)))
    .attr('r',d=>selDot===d.index?7:5).attr('fill',d=>SC[d.changesNum])
    .attr('fill-opacity',d=>!ns||ns.has(d.index)?0.9:0.1)
    .attr('stroke',d=>(selDot===d.index&&d.changesNum>0&&d.changesNum<nMut)?'var(--ink)':'white')
    .attr('stroke-width',d=>(selDot===d.index&&d.changesNum>0&&d.changesNum<nMut)?1.6:.5)
    .style('cursor','pointer')
    .on('mouseenter',(e,d)=>{ selMode='dot'; selDot=d.index; renderAll(); showPinnedInfo(d); })
    .on('mouseleave',()=>{ hideTip(); })
    .on('click',(e,d)=>{ clearSel(); lastMode=null;lastArrow=null;lastSite=null;lastDot=null; renderAll(); });

  // A and D: labelled dots matching panel A reference circle size
  [anc,der].forEach(d=>{
    if(!d) return;
    const col=d.changesNum===0?SC[0]:SC[nMut];
    const lbl=d.changesNum===0?'A':'D';
    const cx=xSc(tx(d)), cy=ySc(ty(d));
    const op=!ns||ns.has(d.index)?1:0.15;
    g.append('circle').attr('cx',cx).attr('cy',cy).attr('r',10)
      .attr('fill',col).attr('fill-opacity',op).attr('stroke','white').attr('stroke-width',.5)
      .style('cursor','pointer')
      .on('mouseenter',()=>{ selMode='dot'; selDot=d.index; renderAll(); showPinnedInfo(d); })
      .on('mouseleave',()=>{ hideTip(); });
    g.append('text').attr('x',cx).attr('y',cy+4)
      .attr('text-anchor','middle')
      .attr('font-family','DM Mono,monospace').attr('font-size',12).attr('font-weight','400')
      .attr('fill','white').attr('pointer-events','none').text(lbl);
  });

  // Leaving panel B entirely restores the pre-B state
  sv.on('mouseleave',()=>{ restoreSel(); renderAll(); hideTip(); });
}

// ── PANEL C ──────────────────────────────────────────────────
function renderC(){
  if(!IM||!NB)return;
  document.getElementById('emC').style.display='none';
  const el=document.getElementById('svgC');el.style.display='block';
  const{W,H}=sz('bC');if(W<60||H<60)return;
  const sv=d3.select(el);sv.selectAll('*').remove();sv.attr('width',W).attr('height',H);

  const nb=nbRows();
  const ns=nodeSet();
  const nd=selDot!=null?IM.find(d=>d.index===selDot):null;
  const nbs=nbSet();
  function nbCount(idx){
    if(!NB||!NB.has(idx))return 0;
    let n=0; NB.get(idx).forEach(varMap=>varMap.forEach(()=>n++)); return n;
  }
  document.getElementById('statC').textContent=nd
    ?`1 intermediate · ${nbCount(selDot)} neighbors`
    :nbs?`${nbs.size} intermediates · ${nb.length} neighbors`
    :`${IM.length} intermediates · ${nb.length} neighbors`;

  if(!nb.length)return;

  const nB=80; // bins — doubled on each axis, same for 2D and both histograms

  // ── Layout constants (must match C_* in setTableHeight) ──
  const mL=58;          // left margin (y-axis labels)
  const hH=60;          // top histogram height (bars hang DOWN from top baseline)
  const topAxisH=20;    // space for pI numbers above the top histogram baseline
  const mT=12;          // gap between bottom of top histogram and top of main plot
  const mB=42;          // bottom margin (x-axis label)
  const hW=60;          // right histogram width (bars extend LEFT from right baseline)
  const rightAxisW=50;  // space for ΔG numbers to the right of right histogram baseline
  const mR=10;          // gap between right edge of main plot and left edge of right histogram

  // offY: top of main plot in SVG coordinates
  const offY = topAxisH + hH + mT;
  // Total right consumption: gap + histogram + axis labels
  const offR = mR + hW + rightAxisW;

  const plotW = W - mL - offR;
  const plotH = H - offY - mB;
  if(plotW<40||plotH<40)return;

  const piRange=domX_C[1]-domX_C[0];
  const dgRange=domY_C[1]-domY_C[0];
  const xSc=d3.scaleLinear().domain(domX_C).range([0,plotW]);
  const ySc=d3.scaleLinear().domain(domY_C).range([plotH,0]);

  // Bin pixel sizes — must be identical for 2D and histograms
  const binW=plotW/nB;  // pixel width per bin
  const binH=plotH/nB;  // pixel height per bin

  // ── Main heatmap ──
  const sX=traitScale(traitX), sY=traitScale(traitY);
  const cnts=new Map();
  nb.forEach(d=>{
    const xi=Math.min(nB-1,Math.max(0,Math.floor((((d.traits[traitX]??0)*sX)-domX_C[0])/(piRange/nB))));
    const yi=Math.min(nB-1,Math.max(0,Math.floor((((d.traits[traitY]??0)*sY)-domY_C[0])/(dgRange/nB))));
    const k=`${xi},${yi}`;cnts.set(k,(cnts.get(k)||0)+1);
  });
  const maxC=d3.max(cnts.values())||1;

  // Heatmap color: fade from white to the active step color by density
  // - arrow hover: SC[selArrow]
  // - dot hover (panel B): SC[min(dot.changesNum+1, 6)] — neighbors represent next step
  // - default: dark blue (Blues palette)
  let heatDark='#08306b'; // default: dark blue
  if(selMode==='arrow' && selArrow!=null){
    // Arrow stripe i shows step-(selArrow-1) neighborhoods, color = SC[selArrow-1]
    heatDark=SC[Math.max(0,selArrow-1)];
  } else if(selMode==='step' && selArrow!=null){
    // Derived stripe: show SC[nMut]
    heatDark=SC[selArrow];
  } else if(selMode==='dot' && selDot!=null){
    const dotIM=IM.find(d=>d.index===selDot);
    if(dotIM) heatDark=SC[Math.min(dotIM.changesNum+1,nMut)];
  }
  const hCol=v=>d3.interpolateRgb('#f0eef8', heatDark)(Math.sqrt(v/maxC));

  const gMain=sv.append('g').attr('transform',`translate(${mL},${offY})`);
  cnts.forEach((c,k)=>{
    const[xi,yi]=k.split(',').map(Number);
    const px=Math.round(xi*binW), py=Math.round(plotH-(yi+1)*binH);
    const pw=Math.round((xi+1)*binW)-px, ph=Math.round(plotH-yi*binH)-py;
    gMain.append('rect').attr('x',px).attr('y',py).attr('width',Math.max(1,pw)).attr('height',Math.max(1,ph))
      .attr('fill',hCol(c)).attr('shape-rendering','crispEdges');
  });

  // Main plot axes — integer ticks from padded domains
  const xTicks=wholeTicks(domX_C,6);
  const yTicksC=wholeTicks(domY_C,5);
  gMain.append('g').attr('class','ax').attr('transform',`translate(0,${plotH})`)
    .call(d3.axisBottom(xSc).tickValues(xTicks).tickSize(4).tickFormat(d3.format('d')));
  gMain.append('g').attr('class','ax')
    .call(d3.axisLeft(ySc).tickValues(yTicksC).tickSize(4).tickFormat(d3.format('d')));
  gMain.append('text').attr('class','axlbl').attr('x',plotW/2).attr('y',plotH+34).attr('text-anchor','middle').text(traitLabel(traitX));
  gMain.append('text').attr('class','axlbl').attr('transform','rotate(-90)').attr('x',-plotH/2).attr('y',-44).attr('text-anchor','middle').text(traitLabel(traitY));

  // A/D dashed box
  const anc=IM.find(d=>d.changesNum===0),der=IM.find(d=>d.changesNum===nMut);
  if(anc&&der){
    gMain.append('rect').attr('class','dbox')
      .attr('x',Math.min(xSc(tx(anc)),xSc(tx(der)))).attr('y',Math.min(ySc(ty(anc)),ySc(ty(der))))
      .attr('width',Math.abs(xSc(tx(anc))-xSc(tx(der)))).attr('height',Math.abs(ySc(ty(anc))-ySc(ty(der))));
  }
  // A and D: large dots with step colour and labels inside
  [anc,der].forEach(d=>{
    if(!d)return;
    const cx=xSc(tx(d)),cy=ySc(ty(d));
    const col=d.changesNum===0?SC[0]:SC[nMut];
    const lbl=d.changesNum===0?'A':'D';
    gMain.append('circle').attr('cx',cx).attr('cy',cy).attr('r',10)
      .attr('fill',col).attr('stroke','white').attr('stroke-width',.5);
    gMain.append('text').attr('x',cx).attr('y',cy+4)
      .attr('text-anchor','middle')
      .attr('font-family','DM Mono,monospace').attr('font-size',12).attr('font-weight','400')
      .attr('fill','white').attr('pointer-events','none').text(lbl);
  });

  // ── TOP HISTOGRAM ──
  // The pI axis line is the BASELINE at the top (y=0 in gHX).
  // pI numbers are drawn ABOVE it with axisTop.
  // Bars hang DOWN from y=0 to y=barLen (toward the main plot).
  // The log count scale (1,10,100) is a vertical axis on the RIGHT
  // side of the histogram, reading from 1 (top, near axis = short bar) to 100 (bottom = tall bar).
  // gHX origin: (mL, topAxisH) in SVG space — this is the baseline of the histogram.

  const xBins=d3.bin().domain(xSc.domain())
    .thresholds(d3.range(domX_C[0]+piRange/nB/2, domX_C[1], piRange/nB))
    (nb.map(d=>(d.traits[traitX]??0)*sX));
  const xHMax=d3.max(xBins,b=>b.length)||1;
  // Log scale: count → bar pixel length downward (0 at baseline, hH at maximum)
  const xLogSc=d3.scaleLog().domain([1,xHMax]).range([0,hH]).clamp(true);

  // gHX: origin at baseline of top histogram (y=topAxisH in SVG)
  const gHX=sv.append('g').attr('transform',`translate(${mL},${topAxisH})`);

  xBins.forEach(bin=>{
    if(!bin.length)return;
    const x=Math.round(xSc(bin.x0));
    const w=Math.max(1,Math.round(xSc(bin.x1))-x);
    const barLen=Math.round(xLogSc(Math.max(1,bin.length)));
    const mid=(bin.x0+bin.x1)/2;
    // Viridis: color by pI position across the full domain
    // t=0 (dark purple) at domX_C[0], t=1 (yellow) at domX_C[1]
    const t=(mid-domX_C[0])/(domX_C[1]-domX_C[0]);
    const col=d3.interpolateViridis(Math.max(0,Math.min(1,t)));
    // Bar hangs DOWN from baseline (y=0): rect from y=0, height=barLen
    gHX.append('rect').attr('x',x).attr('width',w).attr('y',0).attr('height',barLen)
      .attr('fill',col).attr('shape-rendering','crispEdges');
  });


  // pI axis ABOVE baseline — same tick values as main plot
  gHX.append('g').attr('class','ax')
    .call(d3.axisTop(xSc).tickValues(xTicks).tickSize(4).tickFormat(d3.format('d')));

  // Log count axis on RIGHT side of top histogram — vertical, with domain line
  // y=0 = baseline (short bars), y=hH = maximum (tall bars)
  const logTicksX=[1,10,100].filter(v=>v<=xHMax);
  gHX.append('g').attr('class','ax').attr('transform',`translate(${plotW},0)`)
    .call(d3.axisRight(xLogSc).tickValues(logTicksX).tickSize(4).tickFormat(d3.format('d')));

  // ── RIGHT HISTOGRAM ──
  // The ΔG axis line is the BASELINE on the RIGHT (x=hW in gHY).
  // ΔG numbers are drawn to the RIGHT of it with axisRight.
  // Bars extend LEFT from x=hW to x=hW-barLen (toward the main plot = INWARD).
  // The log count scale (1,10,100) is shown at the BOTTOM, rotated.
  // gHY origin: (mL+plotW+mR, offY) in SVG space.

  const yBins=d3.bin().domain(ySc.domain())
    .thresholds(d3.range(domY_C[0]+dgRange/nB/2, domY_C[1], dgRange/nB))
    (nb.map(d=>(d.traits[traitY]??0)*sY));
  const yHMax=d3.max(yBins,b=>b.length)||1;
  // Log scale: count → bar pixel length leftward (0 at baseline, hW at maximum)
  const yLogSc=d3.scaleLog().domain([1,yHMax]).range([0,hW]).clamp(true);

  // Inferno reversed: low ΔG (stable, bottom) = bright/pale, high ΔG (unstable, top) = dark/black
  // t=1 (bright end of inferno) at dgMin, t=0 (dark end) at dgMax
  const yCol=dg=>{
    const t=1-(dg-domY_C[0])/(domY_C[1]-domY_C[0]);
    return d3.interpolateInferno(Math.max(0,Math.min(1,t)));
  };

  // gHY: origin at LEFT edge of right histogram area (x=mL+plotW+mR in SVG)
  const gHY=sv.append('g').attr('transform',`translate(${mL+plotW+mR},${offY})`);

  yBins.forEach(bin=>{
    if(!bin.length)return;
    const y=Math.round(ySc(bin.x1));
    const h=Math.max(1,Math.round(ySc(bin.x0))-y);
    const barLen=Math.round(yLogSc(Math.max(1,bin.length)));
    // Bar extends LEFT from the right baseline (x=hW): x = hW-barLen, width = barLen
    gHY.append('rect').attr('x',hW-barLen).attr('width',barLen).attr('y',y).attr('height',h)
      .attr('fill',yCol((bin.x0+bin.x1)/2)).attr('shape-rendering','crispEdges');
  });

  // ΔG axis on the RIGHT of the histogram (at x=hW) — same tick values as main plot
  gHY.append('g').attr('class','ax').attr('transform',`translate(${hW},0)`)
    .call(d3.axisRight(ySc).tickValues(yTicksC).tickSize(4).tickFormat(d3.format('d')));

  // Log count axis at BOTTOM of right histogram — horizontal, matching top histogram style
  // x=hW = baseline (short bars), x=0 = maximum (bars extend left)
  // We want count=1 near right (x≈hW) and count=100 near left (x≈0)
  const yLogAxis=d3.scaleLog().domain([1,yHMax]).range([hW,0]).clamp(true);
  const logTicksY=[1,10,100].filter(v=>v<=yHMax);
  gHY.append('g').attr('class','ax').attr('transform',`translate(0,${plotH})`)
    .call(d3.axisBottom(yLogAxis).tickValues(logTicksY).tickSize(4).tickFormat(d3.format('d')));
}

// ── PANEL D — Alignment ──────────────────────────────────────
function renderD(){
  if(!seqA) return;
  document.getElementById('wrapD').style.display='block';
  const inner=document.getElementById('alignInner');
  inner.innerHTML='';

  const sA=seqA, sD=seqD||'';
  const len=Math.max(sA.length, sD.length);

  // Diff positions (0-based index)
  const diffPos=new Set();
  for(let i=0;i<len;i++) if(sA[i]&&sD[i]&&sA[i]!==sD[i]) diffPos.add(i);

  const colA=SC[0], colD=SC[nMut];
  const lightA=colA+'22', lightD=colD+'22';

  // Measure label width so sequences align
  // We'll use a temporary span to measure "Ancestral" width, then apply as margin
  // For simplicity, use a fixed offset that fits "Ancestral" at 12px DM Mono
  const lblW=80; // px — enough for "Ancestral"

  // ── Sequence rows ──
  function makeRow(seq, rowCol, lightCol, label){
    const row=document.createElement('div');
    row.className='arow';

    // Label on full-color background — hoverable to show this sequence's neighborhood
    const lbl=document.createElement('span');
    lbl.className='arow-lbl';
    lbl.textContent=label;
    lbl.style.background=rowCol;
    lbl.style.width=lblW+'px';
    lbl.style.textAlign='center';
    lbl.style.cursor='pointer';
    // Find the intermediate index for this sequence (step 0 for Ancestral, nMut for Derived)
    const stepNum = label==='Ancestral' ? 0 : nMut;
    const im = IM ? IM.find(d=>d.changesNum===stepNum) : null;
    if(im){
      lbl.addEventListener('mouseenter',()=>{ selMode='dot'; selDot=im.index; renderAll(); });
      lbl.addEventListener('mouseleave',()=>{ selMode=null; selDot=null; renderAll(); });
      lbl.title=`${label}: ${traitLabel(traitX)} ${traitFmt(traitX,tx(im))} · ${traitLabel(traitY)} ${traitFmt(traitY,ty(im))}`;
    }
    row.appendChild(lbl);

    // Sequence characters
    const seqDiv=document.createElement('div');
    seqDiv.className='arow-seq';
    for(let i=0;i<len;i++){
      const ch=seq[i]||' ';
      const isDiff=diffPos.has(i);
      const span=document.createElement('span');
      span.className='achar'+(isDiff?' diff':'');
      span.textContent=ch;
      span.style.background=isDiff?rowCol:lightCol;
      span.style.color=isDiff?'white':rowCol;
      if(isDiff){
        const site=i+1;
        span.addEventListener('mouseenter',()=>{ selMode='site'; selSite=site; showSiteTip(site); renderAll(); });
        span.addEventListener('mouseleave',()=>{ selMode=null; selSite=null; hideTip(); renderAll(); });
        span.title=`Position ${site}: ${sA[i]||'?'}→${sD[i]||'?'}`;
      }
      seqDiv.appendChild(span);
    }
    row.appendChild(seqDiv);
    return row;
  }

  inner.appendChild(makeRow(sA, colA, lightA, 'Ancestral'));
  if(sD) inner.appendChild(makeRow(sD, colD, lightD, 'Derived'));

  // ── Position numbers row (below sequences, rotated to read bottom-up) ──
  const posRow=document.createElement('div');
  posRow.className='apos-row';
  const posSpacer=document.createElement('span');
  posSpacer.style.display='inline-block';
  posSpacer.style.width=lblW+'px';
  posSpacer.style.marginRight='8px';
  posRow.appendChild(posSpacer);

  for(let i=0;i<len;i++){
    const span=document.createElement('span');
    span.className='apos-char';
    if(diffPos.has(i)){
      span.textContent=String(i+1);
      // 180° from vertical-rl: use vertical-lr so text reads bottom-up
      span.style.writingMode='vertical-lr';
      span.style.transform='rotate(180deg)';
      span.style.alignItems='flex-end';
    }
    posRow.appendChild(span);
  }
  inner.appendChild(posRow);

  // Save state when entering alignment panel, restore when leaving entirely
  inner.addEventListener('mouseenter',()=>saveSel());
  inner.addEventListener('mouseleave',()=>{ restoreSel(); renderAll(); });

  // ── Drag to scroll ──
  const outer=document.getElementById('alignOuter');
  let isDragging=false, startX=0, startScroll=0;
  outer.onmousedown=e=>{isDragging=true;startX=e.clientX;startScroll=outer.scrollLeft;outer.style.cursor='grabbing';};
  document.addEventListener('mouseup',()=>{isDragging=false;if(outer)outer.style.cursor='grab';});
  outer.onmousemove=e=>{if(!isDragging)return;outer.scrollLeft=startScroll-(e.clientX-startX);};
}

function renderAll(){
  setTableHeight();
  if(IM){renderA();renderB();}
  if(IM&&NB)renderC();
}

// traitFmt: format a trait value for display.
// If all values for this trait fall within [0,1], scale to 0-100 (percent) and show 2dp.
// Otherwise show 2dp as-is.
// traitFmt: format a trait value for display.
// Scales 0-1 traits to 0-100 (percent). Uses traitScale() which is already cached per call.
function traitFmt(k, val){
  return (val*traitScale(k)).toFixed(2);
}
function tipPos(){
  // Returns CSS positioning the tip to the top-right of panel B
  const bB=document.getElementById('bB').getBoundingClientRect();
  return{right:(window.innerWidth-bB.right+8)+'px', top:(bB.top+8)+'px'};
}
function applyTipPos(t){
  const p=tipPos();
  t.style.right=p.right; t.style.top=p.top; t.style.left='auto'; t.style.opacity=1;
}

function showPinnedInfo(d){
  const t=document.getElementById('tip');
  const cs=d.changes&&d.changes.length?d.changes.map(c=>`${c.pos}${c.aa}`).join(', '):'Ancestral (A)';
  const traits=d.traits?[traitX,traitY].map(k=>`<span style="color:var(--mut)">${traitLabel(k)} ${traitFmt(k,d.traits[k]??0)}</span>`).join('<br>'):'';
  t.innerHTML=`${cs}${traits?'<br>'+traits:''}`;
  applyTipPos(t);
}

function showSiteTip(site){
  if(!IM) return;
  const t=document.getElementById('tip');
  let ancAA='(add sequence file)', derAA='(add sequence file)';
  if(seqA&&seqD){ ancAA=seqA[site-1]||'?'; derAA=seqD[site-1]||'?'; }
  t.innerHTML=`Site ${site}<br>`+
    `<span style="color:${SC[0]}"><span style="display:inline-block;width:6em">Ancestral</span>${ancAA}</span><br>`+
    `<span style="color:${SC[nMut]}"><span style="display:inline-block;width:6em">Derived</span>${derAA}</span>`;
  applyTipPos(t);
}

// showTip removed — showPinnedInfo handles all dot tooltips
function hideTip(){document.getElementById('tip').style.opacity=0;}

let rt;
window.addEventListener('resize',()=>{clearTimeout(rt);rt=setTimeout(renderAll,120);});
// Double rAF: wait for browser layout before measuring
requestAnimationFrame(()=>requestAnimationFrame(()=>{setTableHeight();renderAll();}));
</script>

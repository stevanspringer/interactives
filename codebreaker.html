<script>
// ================================================================
// ALIEN BIOCHEMISTRY
// ================================================================

const ALIEN_CODE = {
  UU:'Z', VU:'L', WU:'E', XU:'S', YU:'Q', ZU:'A',
  UV:'W', VV:'Z', WV:'G', XV:'D', YV:'A', ZV:'Y',
  UW:'M', VW:'B', WW:'Z', XW:'A', YW:'K', ZW:'J',
  UX:'P', VX:'F', WX:'A', XX:'Z', YX:'O', ZX:'C',
  UY:'T', VY:'A', WY:'U', XY:'I', YY:'Z', ZY:'V',
  UZ:'A', VZ:'R', WZ:'H', XZ:'N', YZ:'X', ZZ:'Z'
};

const START_CODONS = new Set(['UZ','VY','WX','XW','YV','ZU']);
const FUNCTIONAL_DNA = 'UWVXYUYWZUWUZXXUWVZUYXYZUVWVXVWYXUZVXUYWVXYZUXVUZZUVXVZUYXVUXVVWUV';
const TARGET_PROTEIN  = 'AMVLVNAIVFKGLWEKAFKD';

const ADJECTIVES = [
  'epistatic','linked','independent','null','co-dominant','dominant','recessive',
  'pleiotropic','random','statistically-significant','particulate','mendelian',
  'ribosomal','deoxyribonucleic','darwinian','quantitative','continuous','discrete',
  'probable','transcribed','translated','chromosomal','related','mitotic','meiotic',
  'encoded','p2+2pq+q2','homozygous','heterozygous','sickled','chi-squared',
  'peptide-bonded','genomic','mathematical','independently-segregated','heritable',
  'inherited','inbred','structured','conserved','mutant','replicated','phylogenetic',
  'monohybrid','polymorphic','allelic','lethal','deleterious','advantageous',
  'runningoutofgeneticswords','xray-diffracted','folded','helical','polymeric',
  'multi-locus','single-locus','inverted','duplicated','deleted','nonsynonymous',
  'synonymous','noncoding','coding','5-prime','3-prime','N-terminal','C-terminal',
  'lactose-intolerant','high-altitude-adapted','malaria-resistant','untranslated',
  'regulatory','catalytic','evolved','selected','3:1','9:3:3:1','pedigreed'
];

// ================================================================
// TRANSLATION ENGINE  (exact mirror of Perl logic)
// ================================================================

function translate(raw) {
  const dna = raw.toUpperCase().replace(/\s/g, '');

  if (!dna) return { error: 'No sequence entered.', protein: '', hitStop: false };

  for (const c of dna) {
    if (!'UVWXYZ'.includes(c)) {
      // \e[31m red error \e[32m back to green
      return { error: `Can not translate: Unrecognized Nucleotide ${c}. Use only UVWXYZ.`, protein: '', hitStop: false };
    }
  }

  const codingBases = [...dna];

  while (codingBases.length > 1) {
    const p1 = codingBases.shift();
    const p2 = codingBases.shift();
    const codon = p1 + p2;

    if (START_CODONS.has(codon)) {
      const frameCodons = [codon];
      while (codingBases.length > 1) {
        frameCodons.push(codingBases.shift() + codingBases.shift());
      }
      let protein = '';
      let hitStop = false;
      for (const fc of frameCodons) {
        const aa = ALIEN_CODE[fc];
        if (aa === 'Z') { hitStop = true; break; }
        protein += aa;
      }
      return { error: null, protein, hitStop };
    } else {
      codingBases.unshift(p2);
    }
  }

  return { error: 'Can not translate: No start codons. Try mutating the functional sequence.', protein: '', hitStop: false };
}

// ================================================================
// TERMINAL ENGINE
// ================================================================

const outputEl = document.getElementById('output');
const inputEl  = document.getElementById('user-input');
const prefixEl = document.getElementById('input-prefix');

let skipTyping  = false;
let awaitInput  = false;
let inputResolve = null;

function scrollBot() { outputEl.scrollTop = outputEl.scrollHeight; }

// ── Render a line from segments: [{text, cls}] ─────────────────
function renderSegs(segs) {
  const div = document.createElement('div');
  div.className = 'line';
  for (const s of segs) {
    if (!s.text) continue;
    const span = document.createElement('span');
    if (s.cls) span.className = s.cls;
    span.textContent = s.text;
    div.appendChild(span);
  }
  outputEl.appendChild(div);
  scrollBot();
}

// ── Print a SINGLE-colour line (with optional typewriter) ──────
function print(text, cls = 'wh', instant = false) {
  return new Promise(resolve => {
    const div = document.createElement('div');
    div.className = `line ${cls}`;
    outputEl.appendChild(div);
    scrollBot();

    if (instant || text === '' || skipTyping) {
      div.textContent = text;
      resolve();
      return;
    }

    let i = 0;
    const delay = Math.max(4, Math.floor(550 / Math.max(text.length, 1)));

    const tick = () => {
      if (skipTyping) { div.textContent = text; resolve(); return; }
      div.textContent = text.slice(0, ++i);
      scrollBot();
      if (i < text.length) setTimeout(tick, delay);
      else resolve();
    };
    setTimeout(tick, 30);
  });
}

// Instant helpers
const pi    = (t, c='wh') => print(t, c, true);
const blank = ()           => pi('');

// \e[37m  80-char dashes
const sep   = () => pi('-'.repeat(80), 'wh');
// \e[32m  80-char equals
const sepG  = () => pi('='.repeat(80), 'g');
// \e[37m  80-char equals  (win screen)
const sepW  = () => pi('='.repeat(80), 'wh');

// ── Print MIXED-colour line instantly ──────────────────────────
// segs: [ [text, cls], ... ]   cls omitted = inherit body default
function mix(...segs) {
  renderSegs(segs.map(([text, cls]) => ({ text, cls: cls || '' })));
  return Promise.resolve();
}

// ================================================================
// INPUT HELPERS
// ================================================================

function _arm(resolve) {
  awaitInput   = true;
  inputResolve = resolve;
  inputEl.disabled = false;
  inputEl.focus();
}

// Wait for bare Enter (press-enter screens)
function waitEnter(prompt = '[PRESS ENTER TO CONTINUE]') {
  return new Promise(async resolve => {
    await pi(prompt, 'wh');          // prompts are always \e[37m white
    prefixEl.textContent = '';
    inputEl.placeholder  = '↵';
    _arm(resolve);
  });
}

// Wait for text input
function waitText(prompt, pfx = '') {
  return new Promise(async resolve => {
    if (prompt) await pi(prompt, 'wh');  // white prompt
    prefixEl.textContent = pfx;
    inputEl.placeholder  = '';
    _arm(resolve);
  });
}

// Key handler
document.addEventListener('keydown', e => {
  if (!awaitInput && e.key !== 'Enter') skipTyping = true;

  if (awaitInput && e.key === 'Enter') {
    const val = inputEl.value.trim().toUpperCase();
    inputEl.value    = '';
    inputEl.disabled = true;
    prefixEl.textContent = '';
    awaitInput = false;

    if (val) pi(`> ${val}`, 'cy');   // echo typed input in cyan
    blank();

    if (inputResolve) { const r = inputResolve; inputResolve = null; r(val); }
  }
});

document.addEventListener('click', () => { if (!inputEl.disabled) inputEl.focus(); });

// ================================================================
// HALL OF FAME
// ================================================================

function hofLoad() {
  try { return JSON.parse(localStorage.getItem('cb_hof') || '[]'); }
  catch { return []; }
}

function hofSave(entry) {
  const hof = hofLoad();
  hof.push(entry);
  hof.sort((a,b) => a.trials !== b.trials ? a.trials-b.trials : a.seconds-b.seconds);
  localStorage.setItem('cb_hof', JSON.stringify(hof.slice(0,20)));
  return hof;
}

// HOF table is in \e[37m white context
async function showHOF(hof) {
  await pi('~'.repeat(80), 'wh');
  await pi('TRIALS\tSECONDS\tNAME', 'wh');
  for (const e of hof.slice(0,10)) {
    await pi(`${e.trials}\t${e.seconds}\t${e.name}`, 'wh');
  }
  await pi('~'.repeat(80), 'wh');
}

// ================================================================

// ================================================================

let playerName   = '';
let trialHistory = [];   // { trial, seq, result, win }

  await pi('                (")        | _ |            ~~~~~~      ~                       ', 'wh');
  await pi('  :         -)o-/ \\-o     /|[_]|\\          ~~~\\/~~~    ~~~             *        ', 'wh');
  await pi(' [X]            \\_/      / | H | \\          ~~||~~    ~~|~~                     ', 'wh');
  await pi('..|.............d b......\\/..H..\\/............||........|.......................', 'wh');

// ── SCREEN 9: Show functional sequence + first translation ─────

  await mix(['On this planet DNA has ', 'g'], ['6 NUCLEOTIDES (UVWXYZ)', 'cy'], ['.', 'g']);

// ── SCREEN 10: Main lab loop ────────────────────────────────────
async function runLab() {
  const startTime = Date.now();
  let trial = 0;

  while (true) {
    trial++;
    const elapsed = Math.floor((Date.now() - startTime) / 1000);
    const adj = ADJECTIVES[Math.floor(Math.random() * ADJECTIVES.length)];

    await blank();
    await blank();
    await blank();
    await sepG();   // \e[32m green ================
    await pi(`Trial ${trial}. Elapsed time: ${elapsed} of your '${adj}' Earth seconds.`, 'g');
    await pi('Ready to analyze...', 'g');
    await sep();   // \e[37m white ----------------
    // \e[37m white prompt, then \e[36m sets cyan for user input
    await pi('[ENTER AN ALIEN DNA SEQUENCE TO TRANSLATE IT INTO ALIEN PROTEIN]', 'wh');

    const seq = await waitText('', '');   // user types in cyan (per CSS)
    await blank();

    // \e[32m >>> \e[36m (green >>>, then cyan for protein)
    await pi('>>>', 'g');
    const r = translate(seq || '');
    if (r.error) {
      await pi(r.error, 're');   // \e[31m red
    } else {
      await pi(r.protein || '[no coding sequence found]', 'cy');   // \e[36m cyan
    }

    // Record attempt
    const win = r.protein === TARGET_PROTEIN;
    trialHistory.push({ trial, seq, result: r.error ? r.error : (r.protein || '[no coding sequence]'), win });

    if (win) {
      const seconds = Math.floor((Date.now() - startTime) / 1000);
      await runWin(trial, seconds);
      return;
    }
  }
}

  // ── Attempt history ────────────────────────────────────────
  await pi('='.repeat(80), 'wh');
  await pi('ATTEMPT HISTORY', 'ye');
  await pi('='.repeat(80), 'wh');
  await blank();
  const seqW  = 46;   // column width for sequence
  const hdr   = 'TRIAL'.padEnd(7) + 'SEQUENCE'.padEnd(seqW) + 'PROTEIN';
  await pi(hdr, 'wh');
  await pi('-'.repeat(80), 'wh');
  await pi('This is a list of all your trials, can you see where you learned the different', 'g');
  await mix(['features of the alien ', 'g'], ['GENETIC CODE', 'cy'], ['?', 'g']);
  await blank();
  for (const h of trialHistory) {
    const num     = String(h.trial).padEnd(7);
    const seqTrim = h.seq.length > seqW - 1 ? h.seq.slice(0, seqW - 4) + '...' : h.seq;
    const seqCol  = seqTrim.padEnd(seqW);
    const displayResult = h.result.replace('. Try mutating the functional sequence.', '');
    if (h.win) {
      await mix([num, 'wh'], [seqCol, 'cy'], [displayResult, 'ye']);
    } else {
      renderSegs([{ text: num, cls: 'wh' }, { text: seqCol, cls: 'cy' }, { text: displayResult, cls: 'g' }]);
    }
  }
  await blank();
  await pi('-'.repeat(80), 'wh');
  await blank();
  await waitEnter('[PRESS ENTER TO PLAY AGAIN]');
  location.reload();
}

  await new Promise(r => setTimeout(r, 300));
  await runIntro();
  await runName();
  await runStory();
  await runFirstTranslation();
  await runLab();
}

main().catch(err => {
  const div = document.createElement('div');
  div.className = 'line re';
  div.textContent = `SYSTEM ERROR: ${err.message}`;
  outputEl.appendChild(div);
  console.error(err);
});
